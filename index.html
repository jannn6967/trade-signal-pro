<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TradeSignal Pro — Binary Options Signal Generator</title>
  <meta name="description" content="Professional binary options signal generator with live TradingView charts, technical analysis, and real-time trading signals for 22+ currency pairs.">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="TradeSignal">
  <meta name="theme-color" content="#0f172a">
  <link rel="stylesheet" href="styles.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📊</text></svg>">
  <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100' fill='%230f172a'><rect width='100' height='100' rx='20'/><text y='.75em' x='10' font-size='70' fill='white'>📊</text></svg>">
</head>
<body>
  <div class="app-container">
    <!-- Top Header -->
    <header class="app-header">
      <div class="header-content">
        <div class="brand">
          <span class="logo">📊</span>
          <span class="title">TradeSignal <span class="badge">PRO</span></span>
        </div>
        <div class="market-status">
          <span class="status-dot"></span>
          LIVE
        </div>
      </div>
    </header>

    <!-- Main Views -->
    <main class="app-main">
      <!-- Pairs View -->
      <section id="view-pairs" class="app-view active">
        <div class="view-header">
          <h2>Market Pairs</h2>
          <div class="search-bar">
            <input type="text" id="pair-search" placeholder="Search currency..." autocomplete="off">
          </div>
        </div>
        <div class="pairs-grid" id="pairs-list">
          <!-- Populated by JS -->
        </div>
      </section>

      <!-- Chart View -->
      <section id="view-chart" class="app-view">
        <div class="chart-header">
          <div class="pair-info">
            <h2 id="current-pair-name">EUR/USD</h2>
            <div class="timeframe-scroller" id="timeframe-selector">
              <button class="tf-btn active" data-tf="1">1m</button>
              <button class="tf-btn" data-tf="5">5m</button>
              <button class="tf-btn" data-tf="15">15m</button>
              <button class="tf-btn" data-tf="30">30m</button>
              <button class="tf-btn" data-tf="60">1h</button>
            </div>
          </div>
          <button class="action-btn" id="generate-btn" onclick="generateSignal()">
            ⚡ Analyze
            <div class="spinner"></div>
          </button>
        </div>
        <div class="chart-wrapper">
          <div id="tradingview-chart"></div>
        </div>
      </section>

      <!-- Signal View -->
      <section id="view-signal" class="app-view">
        <div class="view-header">
          <h2>Signal Panel</h2>
        </div>
        <div class="signal-display">
          <div class="empty-state" id="empty-signal">
            <div class="icon">📡</div>
            <h3>Ready to Scan</h3>
            <p>Pick a pair and hit "Analyze" to see professional signals.</p>
          </div>
          <div id="signal-result" style="display:none;"></div>
          
          <div class="analysis-section" id="analysis-result" style="display:none;">
            <!-- Detailed technicals go here -->
          </div>
        </div>
      </section>

      <!-- History View -->
      <section id="view-history" class="app-view">
        <div class="view-header">
          <h2>Signal History</h2>
        </div>
        <div class="history-list" id="history-list">
          <!-- Populated by JS -->
          <div class="empty-state" id="empty-history">
            <div class="icon">📋</div>
            <p>No signals generated yet.</p>
          </div>
        </div>
      </section>
    </main>

    <!-- Bottom Navigation -->
    <nav class="bottom-nav">
      <button class="nav-item active" data-view="pairs" onclick="switchView('pairs')">
        <span class="nav-icon">🌍</span>
        <span class="nav-label">Pairs</span>
      </button>
      <button class="nav-item" data-view="chart" onclick="switchView('chart')">
        <span class="nav-icon">📈</span>
        <span class="nav-label">Chart</span>
      </button>
      <button class="nav-item" data-view="signal" onclick="switchView('signal')">
        <span class="nav-icon">⚡</span>
        <span class="nav-label">Signal</span>
      </button>
      <button class="nav-item" data-view="history" onclick="switchView('history')">
        <span class="nav-icon">📋</span>
        <span class="nav-label">History</span>
      </button>
    </nav>
  </div>

  <!-- Scripts -->
  <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
  <script src="app.js"></script>
</body>
</html>
